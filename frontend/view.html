<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XChange - View Item</title>
    <script src="/assets/tailwind.min.js"></script>
    <script src="/assets/prism.min.js"></script>
    <script src="/assets/prism-python.min.js"></script>
    <script src="/assets/prism-json.min.js"></script>
    <script src="/assets/prism-bash.min.js"></script>
    <script src="/assets/prism-markdown.min.js"></script>
    <script src="/assets/prism-javascript.min.js"></script>
    <link rel="stylesheet" href="/assets/prism-tomorrow.min.css" id="prism-theme">
    <script src="/assets/app.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        initTheme();
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="app" class="container mx-auto px-4 py-8 max-w-2xl">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold cursor-pointer" onclick="window.location.href='/'">XChange</h1>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </header>

        <div id="view-section" class="space-y-4">
            <div id="view-card" class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="view-title" class="text-xl font-semibold">Viewing Item</h2>
                    <a href="/" class="text-blue-500 hover:underline">New Item</a>
                </div>
                <div id="view-content" class="overflow-auto max-h-[70vh]">
                    Loading...
                </div>
                <div id="raw-link-container" class="mt-6 pt-4 border-t dark:border-gray-700 hidden">
                    <label class="text-[10px] font-semibold uppercase text-gray-500 dark:text-gray-400 block mb-1">Raw URL (for curl)</label>
                    <div class="flex items-center">
                        <input id="view-raw-url" readonly class="flex-grow p-1.5 border rounded-l dark:bg-gray-700 dark:border-gray-600 text-xs font-mono">
                        <button onclick="copyResult('view-raw-url')" class="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-1.5 rounded-r hover:bg-gray-300 dark:hover:bg-gray-600 transition text-xs">Copy</button>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-sm text-gray-500">
            <a href="/admin" id="admin-link" class="hover:underline hidden">Admin Panel</a>
        </footer>
    </div>

    <script>
        loadConfig().then(config => {
            if (config && config.ENABLE_ADMIN_UI) {
                document.getElementById('admin-link').classList.remove('hidden');
            }
        });

        const path = window.location.pathname;
        if (path.startsWith('/view/')) {
            const id = path.split('/')[2];
            loadViewItem(id);
        }
    </script>
</body>
</html>
